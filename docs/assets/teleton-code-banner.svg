<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="mainBg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
            <stop stop-color="#09090b"/>
            <stop offset="1" stop-color="#020203"/>
        </linearGradient>

        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.04"/>
        </pattern>

        <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(950 210) rotate(90) scale(300)">
            <stop stop-color="#2459f5" stop-opacity="0.15"/>
            <stop offset="1" stop-color="#2459f5" stop-opacity="0"/>
        </radialGradient>

        <filter id="shadow" x="-40" y="-20" width="600" height="400" filterUnits="userSpaceOnUse">
            <feGaussianBlur stdDeviation="25" in="SourceAlpha"/>
            <feOffset dy="20"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect width="1200" height="420" fill="url(#mainBg)"/>
    <rect width="1200" height="420" fill="url(#grid)"/>
    <circle cx="950" cy="210" r="300" fill="url(#glow)"/>

    <g transform="translate(80, 150)">
        <text font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="900" letter-spacing="-0.05em" fill="white">
            Teleton Code
        </text>
        <text y="48" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#71717a">
            Companion IDE for Teleton Agent workflow.
        </text>

        <g transform="translate(0, 90)">
            <rect width="130" height="32" rx="16" fill="rgba(36, 89, 245, 0.1)" stroke="#2459f5" stroke-width="1"/>
            <text x="65" y="21" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="800" fill="#60a5fa">APPROVAL FLOW</text>

            <rect x="140" width="150" height="32" rx="16" fill="rgba(34, 197, 94, 0.1)" stroke="#22c55e" stroke-width="1"/>
            <text x="215" y="21" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="800" fill="#4ade80">TELETON-POWERED</text>

            <rect x="300" width="110" height="32" rx="16" fill="rgba(168, 85, 247, 0.1)" stroke="#a855f7" stroke-width="1"/>
            <text x="355" y="21" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="800" fill="#c084fc">LOCAL FIRST</text>
        </g>
    </g>

    <g transform="translate(620, 50)" filter="url(#shadow)">
        <rect width="520" height="320" rx="16" fill="#0d0d0f" stroke="#1f1f23" stroke-width="1.5"/>

        <path d="M0 16C0 7.16 7.16 0 16 0H504C512.84 0 520 7.16 520 16V40H0V16Z" fill="#141417"/>
        <g transform="translate(18, 20)">
            <circle cx="0" cy="0" r="4.5" fill="#3f3f46"/>
            <circle cx="18" cy="0" r="4.5" fill="#3f3f46"/>
            <circle cx="36" cy="0" r="4.5" fill="#3f3f46"/>
        </g>
        <text x="260" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#52525b">workspace / active chat</text>

        <rect x="0" y="40" width="120" height="280" fill="#09090b" fill-opacity="0.8"/>
        <g transform="translate(15, 65)">
            <rect width="60" height="5" rx="2.5" fill="#27272a"/>
            <rect y="18" width="80" height="5" rx="2.5" fill="#2459f5" fill-opacity="0.4"/>
            <rect y="36" width="45" height="5" rx="2.5" fill="#27272a"/>
            <rect y="54" width="70" height="5" rx="2.5" fill="#27272a"/>
        </g>

        <g transform="translate(140, 75)">
            <text font-family="Consolas, monospace" font-size="14" fill="#c678dd">const</text>
            <text x="50" font-family="Consolas, monospace" font-size="14" fill="#abb2bf"> mode = </text>
            <text x="105" font-family="Consolas, monospace" font-size="14" fill="#98c379">"teleton-code"</text>

            <text y="30" font-family="Consolas, monospace" font-size="14" fill="#c678dd">await</text>
            <text x="50" y="30" font-family="Consolas, monospace" font-size="14" fill="#abb2bf">agent.</text>
            <text x="98" y="30" font-family="Consolas, monospace" font-size="14" fill="#61afef">inspect</text>
            <text x="155" y="30" font-family="Consolas, monospace" font-size="14" fill="#abb2bf">()</text>

            <text y="58" font-family="Consolas, monospace" font-size="14" fill="#c678dd">await</text>
            <text x="50" y="58" font-family="Consolas, monospace" font-size="14" fill="#abb2bf">agent.</text>
            <text x="98" y="58" font-family="Consolas, monospace" font-size="14" fill="#61afef">edit</text>
            <text x="135" y="58" font-family="Consolas, monospace" font-size="14" fill="#abb2bf">()</text>

            <text y="86" font-family="Consolas, monospace" font-size="14" fill="#c678dd">await</text>
            <text x="50" y="86" font-family="Consolas, monospace" font-size="14" fill="#abb2bf">agent.</text>
            <text x="98" y="86" font-family="Consolas, monospace" font-size="14" fill="#61afef">verify</text>
            <text x="150" y="86" font-family="Consolas, monospace" font-size="14" fill="#abb2bf">()</text>

            <text x="0" y="118" font-family="monospace" font-size="13" fill="#5c6370" opacity="0.8">// Ready for approval flow</text>
        </g>

        <g transform="translate(140, 230)">
            <rect width="350" height="64" rx="12" fill="#141417" stroke="#2459f5" stroke-width="1.5"/>
            <text x="16" y="37" font-family="sans-serif" font-size="13" fill="#52525b">Build a small browser game...</text>
            <rect x="290" y="15" width="45" height="34" rx="8" fill="#2459f5"/>
            <path d="M308 33L312.5 28L317 33" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </g>

        <g transform="translate(320, -14)">
            <rect width="185" height="28" rx="14" fill="#000" stroke="#22c55e" stroke-width="1.5"/>
            <circle cx="18" cy="14" r="4" fill="#22c55e">
                <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
            </circle>
            <text x="32" y="18.5" font-family="sans-serif" font-size="11" font-weight="900" fill="#22c55e" letter-spacing="0.04em">TELETON CONNECTED</text>
        </g>
    </g>
</svg>
